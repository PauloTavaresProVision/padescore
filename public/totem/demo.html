<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Totem Demo (current state)</title>
  <style>
    :root {
      --blue: #2d8cff;
      --cyan: #12c8ff;
      --lime: #9bf000;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      background: #171717;
      height: 100%;
      font-family: Impact, "Arial Black", Arial, sans-serif;
      color: #fff;
    }
    .wrap {
      position: fixed; inset: 0;
      display: grid; place-items: center;
    }
    .poster {
      width: 192px; height: 640px;
      position: relative; overflow: hidden;
      background:
        radial-gradient(circle at 50% 55%, rgba(0,84,255,.42), transparent 34%),
        radial-gradient(circle at 50% 18%, rgba(0,36,110,.55), transparent 35%),
        linear-gradient(180deg, #020713 0%, #020713 34%, #001334 64%, #020713 100%);
      box-shadow: 0 0 0 1px rgba(255,255,255,.08);
    }
    .arc {
      position: absolute; top: -64px; width: 170px; height: 230px;
      border: 1px solid rgba(45, 140, 255, .85); border-radius: 50%;
      filter: drop-shadow(0 0 7px var(--blue));
      opacity: .75; pointer-events: none;
    }
    .arc.l { left: -111px; } .arc.r { right: -111px; }
    .dots {
      position: absolute; inset: 0; opacity: .38;
      background-image: radial-gradient(rgba(68,165,255,.85) 1px, transparent 1px);
      background-size: 7px 7px;
      -webkit-mask-image: radial-gradient(circle at top center, #000 0 18%, transparent 42%);
      mask-image: radial-gradient(circle at top center, #000 0 18%, transparent 42%);
      pointer-events: none;
    }
    .content {
      position: relative; z-index: 1; height: 100%;
      padding: 7px 11px 6px;
      text-align: center; box-sizing: border-box;
    }
    .brand {
      width: 79px; height: auto; display: block; margin: 0 auto 3px;
      filter: drop-shadow(0 0 7px rgba(45,140,255,.95));
    }
    .title {
      font-size: 25px; line-height: .9; font-style: italic;
      letter-spacing: .3px; text-shadow: 0 0 8px rgba(255,255,255,.45);
    }
    .year {
      color: var(--lime); font-size: 21px; line-height: 1;
      letter-spacing: 1px; text-shadow: 0 0 8px rgba(155,240,0,.65);
    }
    .country {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 8px; margin: 0 11px 3px;
      font-family: Arial, sans-serif; font-weight: 900;
      font-size: 8px; letter-spacing: 7px;
    }
    .country span.line, .div span.line, .vs span.line, .nt span.line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan));
      box-shadow: 0 0 7px var(--cyan);
    }
    .country span.line.r, .div span.line.r, .vs span.line.r, .nt span.line.r {
      background: linear-gradient(90deg, var(--cyan), transparent);
    }
    .neon {
      border: 1px solid rgba(65,162,255,.98); border-radius: 5px;
      box-shadow: inset 0 0 7px rgba(45,140,255,.55), 0 0 8px rgba(45,140,255,.75);
      background: rgba(2,10,30,.74);
    }
    .field {
      height: 30px; display: grid; place-items: center;
      margin-bottom: 5px; font-size: 23px; line-height: 1; letter-spacing: 1px;
    }
    .div {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 7px; margin: 0 11px 1px;
      color: var(--lime); font-size: 12px; font-style: italic;
      letter-spacing: .8px; text-shadow: 0 0 8px rgba(155,240,0,.8);
    }
    .div span.line {
      background: linear-gradient(90deg, transparent, var(--lime));
      box-shadow: 0 0 8px var(--lime);
    }
    .div span.line.r {
      background: linear-gradient(90deg, var(--lime), transparent);
    }
    .players {
      position: relative; height: 86px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      align-items: end; margin: 0 0 -2px;
    }
    .players .player:first-child::before,
    .players .player:first-child::after { left: 65%; }
    .players .player:last-child::before,
    .players .player:last-child::after { left: 35%; }
    .player {
      height: 84px; position: relative;
      filter: drop-shadow(0 0 11px rgba(0,119,255,.9));
    }
    .player::before {
      content: ""; position: absolute; left: 50%; top: 0;
      width: 33px; height: 33px; transform: translateX(-50%);
      border-radius: 50% 50% 44% 44%;
      background:
        radial-gradient(circle at 35% 38%, rgba(255,255,255,.55), transparent 12%),
        linear-gradient(180deg, #f0ba8b, #9b5d3c);
      box-shadow: inset 0 -3px 0 rgba(0,0,0,.18);
    }
    .player::after {
      content: ""; position: absolute; left: 50%; bottom: 0;
      width: 60px; height: 58px; transform: translateX(-50%);
      border-radius: 22px 22px 10px 10px;
      background:
        linear-gradient(36deg, transparent 0 26%, rgba(245, 196, 150, .95) 27% 38%, transparent 39%),
        linear-gradient(-35deg, transparent 0 26%, rgba(194, 124, 82, .95) 27% 38%, transparent 39%),
        linear-gradient(135deg, #222d35, #07101d);
    }
    .names {
      min-height: 38px; display: grid; place-items: center;
      margin: 0 0 2px; padding: 3px 5px;
      font-size: 13px; line-height: 1.15; letter-spacing: 1px;
      text-shadow: 0 0 7px rgba(255,255,255,.45);
    }
    .vs {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 11px;
      margin: 4px 10px 1px;
      color: var(--lime); font-size: 32px; line-height: 1;
      font-style: italic; text-shadow: 0 0 11px rgba(155,240,0,.8);
    }
    .vs span.line {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--lime));
      box-shadow: 0 0 8px var(--lime);
    }
    .vs span.line.r {
      background: linear-gradient(90deg, var(--lime), transparent);
    }
    .timebox {
      height: 52px; display: grid; place-items: center;
      margin: 3px 0 4px;
      border: 1px solid rgba(155,240,0,.95); border-radius: 5px;
      background: rgba(2,10,30,.74);
      box-shadow: inset 0 0 6px rgba(155,240,0,.35), 0 0 8px rgba(155,240,0,.55);
    }
    .timebox > div { display: grid; gap: 3px; justify-items: center; align-content: center; padding-top: 2px; }
    .time-label { color: var(--lime); font-size: 10px; letter-spacing: .7px; line-height: 1.05; }
    .time { font-size: 30px; line-height: .82; letter-spacing: 1px; text-shadow: 0 0 8px rgba(155,240,0,.55); }
    .next {
      min-height: 59px; padding: 4px 5px; display: grid; place-items: center;
      font-family: Arial, sans-serif; font-weight: 900; text-transform: uppercase;
    }
    .nt {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 7px; align-items: center; width: 100%;
      color: var(--cyan); font-size: 12px; letter-spacing: .8px; margin-bottom: 2px;
    }
    .nt span.line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan));
      box-shadow: 0 0 6px var(--cyan);
    }
    .nt span.line.r {
      background: linear-gradient(90deg, var(--cyan), transparent);
    }
    .next-line { font-size: 9px; letter-spacing: 1px; line-height: 1.35; }
    .next-vs { color: var(--lime); font-size: 15px; line-height: 1; font-family: Impact, "Arial Black", Arial, sans-serif; }
    .sponsors-strip {
      position: absolute; left: 7px; right: 7px; bottom: 6px;
      height: 32px;
    }
    .slide {
      position: absolute; inset: 0;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 7px; place-items: center;
    }
    .slide-0 { animation: show-0 10s infinite ease; }
    .slide-1 { animation: show-1 10s infinite ease; }
    @keyframes show-0 {
      0%, 46% { opacity: 1; transform: scale(1); }
      50%, 96% { opacity: 0; transform: scale(0.94); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes show-1 {
      0%, 46% { opacity: 0; transform: scale(0.94); }
      50%, 96% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.94); }
    }
    .sponsor {
      height: 32px; width: 100%;
      padding: 4px 9px; border-radius: 8px;
      background: linear-gradient(180deg, #ffffff 0%, #eef2fb 65%, #d8e1f0 100%);
      box-shadow:
        0 0 14px rgba(45,140,255,.65),
        0 0 0 1px rgba(160,200,255,.55),
        inset 0 1px 0 rgba(255,255,255,1),
        inset 0 -2px 4px rgba(0,40,90,.12);
      display: grid; place-items: center; overflow: hidden;
      font-family: Arial, sans-serif; font-weight: 900;
    }
    .sponsor img {
      max-width: 100%; max-height: 100%; width: auto;
      object-fit: contain; display: block;
    }
    .sponsor.text-red { color: #d92341; font-size: 11px; letter-spacing: .3px; }
    .sponsor.text-blue { color: #003c8c; font-size: 11px; letter-spacing: .3px; }
    .sponsor.text-green { color: #109a5d; font-size: 11px; letter-spacing: .3px; }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="poster">
      <div class="arc l"></div>
      <div class="arc r"></div>
      <div class="dots"></div>
      <section class="content">
        <img class="brand" src="/totem/standard-bank-angola.svg" alt="">
        <div class="title">OPEN PADEL</div>
        <div class="year">2026</div>
        <div class="country"><span class="line"></span><span>ANGOLA</span><span class="line r"></span></div>

        <div class="field neon">CAMPO 1</div>

        <div class="div"><span class="line"></span><span>DUPLA A</span><span class="line r"></span></div>
        <div class="players">
          <div class="player"></div>
          <div class="player"></div>
        </div>
        <div class="names neon"><div>CARLOS SOUSA<br>SERGIO VIEIRA</div></div>

        <div class="vs"><span class="line"></span><span>VS</span><span class="line r"></span></div>

        <div class="div"><span class="line"></span><span>DUPLA B</span><span class="line r"></span></div>
        <div class="players">
          <div class="player"></div>
          <div class="player"></div>
        </div>
        <div class="names neon"><div>NICOLAU M.<br>WOJTEK D.</div></div>

        <div class="timebox">
          <div>
            <div class="time-label">HORÁRIO DO JOGO</div>
            <div class="time">18:00</div>
          </div>
        </div>

        <div class="next neon">
          <div style="width:100%">
            <div class="nt"><span class="line"></span><span>A SEGUIR</span><span class="line r"></span></div>
            <div class="next-line">DIOGO M | MANUEL P</div>
            <div class="next-vs">VS</div>
            <div class="next-line">MIGUEL R | TOMÁS G</div>
          </div>
        </div>

        <div class="sponsors-strip">
          <div class="slide slide-0">
            <div class="sponsor"><img src="/totem/standard-bank-angola.svg"></div>
            <div class="sponsor text-red">CANDANDO</div>
          </div>
          <div class="slide slide-1">
            <div class="sponsor text-blue">BEEFEATER</div>
            <div class="sponsor text-green">BYTE DIGITAL</div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
